<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rémi Maloberti</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
    </div>
    <header>
      <h1 class="fade-in">RM</h1>

      <nav id="nav" class="fade-in">
        <a href="#about">À propos</a>
        <a href="#projects">Projets</a>
        <a href="#contact">Contact</a>
      </nav>

      <div class="actions fade-in">
        <button id="theme-toggle">🌙</button>
        <div id="burger">☰</div>
      </div>
    </header>

    <section id="hero">
      <h2 id="typing"></h2>
      <p class="fade-in delay">Je crée des expériences digitales modernes</p>
      <button onclick="scrollToContact()" class="fade-in">Me contacter</button>
    </section>

    <section id="about" class="fade-in">
      <h2>À propos</h2>
      <p>
        Développeur passionné par les interfaces modernes, l’UX et la
        performance.
      </p>
    </section>

    <section id="projects">
      <h2 class="fade-in">Projets</h2>

      <div class="card fade-in">
        <h3>Site vitrine</h3>
        <p>Design moderne + responsive</p>
      </div>

      <div class="card fade-in">
        <h3>App JavaScript</h3>
        <p>Gestion dynamique des données</p>
      </div>
    </section>

    <section id="contact" class="fade-in">
      <h2>Contact</h2>
      <form>
        <input type="text" placeholder="Nom" required />
        <input type="email" placeholder="Email" required />
        <textarea placeholder="Message"></textarea>
        <button type="submit">Envoyer</button>
      </form>
    </section>

    <footer>
      <p>© 2026 - Rémi Maloberti</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
